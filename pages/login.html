<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="icon/png" href="../assets/icon.png" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../styles/login.css" />
    <title>Iniciar sessão - Guitarrão</title>
  </head>
  <body>
    <header>
      <nav
        class="navbar navbar-expand-lg navbar-light bg-white border-bottom fixed-top"
      >
        <div
          class="container d-flex justify-content-between align-items-center"
        >
          <a class="navbar-brand mx-4" href="#">
            <img class="logo" src="../assets/icon.png" alt="logo" />
          </a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#menu"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse justify-content-end" id="menu">
            <ul class="navbar-nav gap-4 text-center">
              <li class="nav-item">
                <a href="../index.html" class="nav-link">Loja</a>
              </li>
              <li class="nav-item">
                <a href="../pages/login.html" class="nav-link">Entrar</a>
              </li>
              <li class="nav-item">
                <a href="#" class="nav-link">Carrinho</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>
    <main>
        <div class="container-fluid p-0 d-flex justify-content-center align-items-center">
            <div class="login">
                <h2>Iniciar sessão na Guitarrão</h2>
                <div class="formulario">
                    <form id="formLogin">
                        <label>E-mail</label>
                        <input type="email" id="email" placeholder="Digite seu e-mail">
    
                        <label>Senha</label>
                        <input type="password" id="senha" placeholder="Digite sua senha">
    
                        <button class="botao" type="submit">
                            Entrar
                        </button>
    
                        <p id="mensagem"></p>
                        <p>Não tem uma conta Guitarrão? <a href="../pages/cadastro.html" class="cadastro">Crie uma agora mesmo!</a></p>
                    </form>
                </div>
            </div>
            <div class="imagem">
                <img src="../assets/guitar.png" alt="Violão">
            </div>
        </div>
        <script src="../scripts/login.js"></script>
    </main>
    <footer></footer>
  </body>
  <footer class="rodape">
    <nav
        class="navbar navbar-footer border-top fixed-bottom"
      >
      <div class="container d-flex justify-content-center align-items-center">
        <div class="legal">
            <p>Copyright &copy; 2026 Guitarrão. Todos os direitos reservados. Guitarrão Instrumentos Musicais Ltda.</p>
        </div>
      </div>
    </nav>
  </footer>
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"
  ></script>
</html>
