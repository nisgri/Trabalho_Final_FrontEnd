<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">

    <title>Login</title>

    <!-- CSS -->
    <link rel="stylesheet" href="../styles/login.css">

</head>

<body>

    <div class="container">

        <h1>Login</h1>

        <form id="formLogin">

            <label>Email</label>

            <input type="email" id="email" placeholder="Digite seu email">

            <label>Senha</label>

            <input type="password" id="senha" placeholder="Digite sua senha">

            <button type="submit">
                Entrar
            </button>

            <p id="mensagem"></p>

        </form>

    </div>

    <!-- JavaScript -->
    <script src="../scripts/login.js"></script>

</body>

</html>
