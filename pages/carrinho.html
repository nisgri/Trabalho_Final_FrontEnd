<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carrinho - Guitarrão</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../styles/carrinho.css" />
  </head>
  <body>
    <header>
      <nav
        class="navbar navbar-expand-lg navbar-light bg-white border-bottom fixed-top"
      >
        <div
          class="container d-flex justify-content-between align-items-center"
        >
          <a class="navbar-brand mx-4" href="../index.html">
            <img class="logo" src="../assets/icon.png" alt="logo" />
          </a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#menu"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse justify-content-end" id="menu">
            <ul class="navbar-nav gap-4 text-center">
              <li class="nav-item">
                <a href="../index.html" class="nav-link">Loja</a>
              </li>
              <li class="nav-item">
                <a href="login.html" class="nav-link">Login</a>
              </li>
              <li class="nav-item">
                <a href="carrinho.html" class="nav-link">Carrinho</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <main class="container mt-5 pt-5">
      <div class="carrinho">
        <img
          class="icone"
          src="../assets/carrinho.png"
          alt="carrinho de compras"
        />
        <h2 class="text-center mb-4">Carrinho de compras</h2>
      </div>
      <div id="carrinho-itens"></div>

      <div class="mt-4 text-end">
        <h4>Total: R$ <span id="total">0,00</span></h4>
        <button class="btn btn-success" id="btn-checkout">
          Finalizar compra
        </button>
      </div>
    </main>
    <footer class="rodape">
      <nav class="navbar navbar-footer border-top">
        <div class="container d-flex justify-content-center align-items-center">
          <div class="legal">
            <p>
              Copyright &copy; 2026 Guitarrão. Todos os direitos reservados.
              Guitarrão Instrumentos Musicais Ltda.
            </p>
          </div>
        </div>
      </nav>
    </footer>
    <script src="../scripts/carrinho.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
