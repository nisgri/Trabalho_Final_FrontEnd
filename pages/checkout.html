<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="icon/png" href="../assets/icon.png" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../styles/checkout.css" />
    <title>Finalizar compra - Guitarrão</title>
  </head>
  <body>
    <header>
      <nav
        class="navbar navbar-expand-lg navbar-light bg-white border-bottom fixed-top"
      >
        <div
          class="container d-flex justify-content-between align-items-center"
        >
          <a class="navbar-brand mx-4" href="#">
            <img class="logo" src="../assets/icon.png" alt="logo" />
          </a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#menu"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse justify-content-end" id="menu">
            <ul class="navbar-nav gap-4 text-center">
              <li class="nav-item">
                <a href="../index.html" class="nav-link">Loja</a>
              </li>
              <li class="nav-item">
                <a href="../pages/login.html" class="nav-link">Entrar</a>
              </li>
              <li class="nav-item">
                <a href="../pages/carrinho.html" class="nav-link">Carrinho</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>
    <main>
      <div class="container">
        <div class="row">
          <div class="col-lg-6 order-2 order-lg-1 mb-4 mb-lg-0">
            <div class="dados d-flex flex-column mx-auto">
              <h2>Finalizar compra</h2>
              <form id="checkoutForm">
                <input type="text" id="nome" placeholder="Nome completo" />
                <input type="email" id="email" placeholder="E-mail" />
                <input type="text" id="cep" placeholder="CEP" />
                <input type="text" id="estado" placeholder="Estado" />
                <input type="text" id="bairro" placeholder="Bairro" />
                <input type="text" id="logradouro" placeholder="Logradouro" />
                <input type="text" id="complemento" placeholder="Complemento" />

                <select id="pagamento">
                  <option value="">Forma de pagamento</option>
                  <option>Boleto bancário</option>
                  <option>Cartão de crédito</option>
                  <option>Cartão de débito</option>
                  <option>PIX</option>
                </select>

                <button class="botao mt-4" type="submit">
                  Finalizar compra
                </button>
              </form>
              <p id="mensagem"></p>
            </div>
          </div>
          <div class="col-lg-6 order-1 order-lg-2">
            <div class="pedido d-flex flex-column mx-auto" id="resumo-pedido">
              <h3>Resumo do pedido</h3>
              <!-- Items will be loaded here -->
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
  <footer class="rodape">
    <nav class="navbar navbar-footer border-top">
      <div class="container d-flex justify-content-center align-items-center">
        <div class="legal">
          <p>
            Copyright &copy; 2026 Guitarrão. Todos os direitos reservados.
            Guitarrão Instrumentos Musicais Ltda.
          </p>
        </div>
      </div>
    </nav>
  </footer>
  <script src="../scripts/checkout.js"></script>
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"
  ></script>
</html>
